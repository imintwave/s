<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniversalRoblox Key</title>
    <!-- Connecting official Telegram WebApp script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .brand {
            margin-bottom: 40px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .brand:hover {
            opacity: 0.8;
        }

        .brand-name {
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .brand-name span {
            color: #da2f2f;
        }

        .brand-tagline {
            color: #666;
            font-size: 14px;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .key-box {
            background: #111;
            border: 2px solid #1e1e1e;
            border-radius: 16px;
            padding: 36px 20px;
            margin-bottom: 20px;
            transition: all 0.4s ease;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .key-box.active {
            border-color: #da2f2f;
            box-shadow: 0 0 60px rgba(218, 47, 47, 0.08);
        }

        .key-box .key-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 12px;
        }

        .key-box .key-text {
            font-family: 'Courier New', monospace;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 6px;
            word-break: break-all;
            user-select: all;
            transition: color 0.3s;
        }

        .key-box .key-text.placeholder {
            color: #333;
            font-size: 16px;
            letter-spacing: 1px;
            font-family: -apple-system, 'Segoe UI', sans-serif;
            font-weight: 400;
        }

        .key-box .key-text.generated {
            color: #fff;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .key-box .copy-hint {
            font-size: 12px;
            color: #333;
            margin-top: 12px;
            transition: color 0.3s;
        }

        .key-box.active .copy-hint {
            color: #555;
        }

        .key-box.active .copy-hint:hover {
            color: #888;
        }

        /* Accent red button for subscribing */
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: #da2f2f;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
            display: none;
        }

        .btn-primary:hover {
            background: #b82525;
            box-shadow: 0 0 20px rgba(218, 47, 47, 0.2);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        /* Bordered buttons for secondary actions */
        .btn-secondary {
            width: 100%;
            padding: 14px;
            background: transparent;
            color: #aaa;
            border: 1px solid #1e1e1e;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #141414;
            border-color: #333;
            color: #fff;
        }

        .btn-secondary:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
            color: #666;
        }
        
        #copyBtn {
            margin-bottom: 0; /* Clear margin for the last button */
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            background: transparent;
        }

        .message.success {
            color: #4caf50;
        }

        .message.error {
            color: #f44336;
        }

        .message.info {
            color: #42a5f5;
        }

        .message.warning {
            color: #ffc107;
        }

        .footer {
            margin-top: 32px;
            color: #2a2a2a;
            font-size: 12px;
        }

        @media (max-width: 420px) {
            .brand-name {
                font-size: 22px;
            }
            .key-box .key-text {
                font-size: 26px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand" id="brandLink">
            <div class="brand-name">Universal<span>Roblox</span></div>
            <div class="brand-tagline">Key Generator</div>
        </div>

        <div class="key-box" id="keyBox">
            <div class="key-label">Your Key</div>
            <div class="key-text placeholder" id="keyText">⏳ Loading...</div>
            <div class="copy-hint">Click to copy</div>
        </div>

        <!-- Action Buttons -->
        <button class="btn-primary" id="subBtn">📢 Subscribe to Channel</button>
        <button class="btn-secondary" id="checkSubBtn" style="display: none;">🔄 Check Subscription</button>
        <button class="btn-secondary" id="copyBtn" disabled>📋 Copy Key</button>

        <div class="message" id="message"></div>

        <div class="footer">
            <span style="color: #2a2a2a;">Powered by</span>
            <span style="color: #da2f2f;">UniversalRoblox</span>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== DOM ELEMENTS =====
            const keyText = document.getElementById('keyText');
            const keyBox = document.getElementById('keyBox');
            const copyBtn = document.getElementById('copyBtn');
            const subBtn = document.getElementById('subBtn');
            const checkSubBtn = document.getElementById('checkSubBtn');
            const messageEl = document.getElementById('message');
            const brandLink = document.getElementById('brandLink');

            // ===== CONSTANTS =====
            const MSK_OFFSET = 10800;
            const CHANNEL_URL = 'https://t.me/UniversalRoblox';
            
            const CHAT_ID = '@UniversalRoblox'; 
            const BOT_TOKEN = '6068348600:AAEn16T6yZKPizHIOoQo9_QDLhk6r0qf-YM';

            // ===== CHARACTER SETS FOR EACH DAY OF THE WEEK =====
            const DailyCharSets = {
                1: ['1','4','6','8','d','b','x','a','o','g'],
                2: ['2','5','6','0','o','j','t','b','d','p'],
                3: ['3','7','9','1','z','k','u','c','e','q'],
                4: ['4','8','0','2','f','l','v','d','n','r'],
                5: ['5','9','1','3','l','m','w','e','g','s'],
                6: ['6','0','2','4','t','n','x','f','h','t'],
                7: ['7','1','3','5','8','o','y','g','i','u']
            };

            // ===== STATE =====
            let internetTimestamp = null;
            let syncComplete = false;
            let currentKey = '';
            let isSubscribed = false;

            // ===== TELEGRAM API =====
            const tg = window.Telegram?.WebApp;
            if (tg) tg.expand();

            // Function to check subscription status
            async function checkTelegramSubscription(userId) {
                if (!userId) return false;
                try {
                    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=${CHAT_ID}&user_id=${userId}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.ok) {
                        const status = data.result.status;
                        return ['member', 'administrator', 'creator'].includes(status);
                    }
                    return false;
                } catch (e) {
                    console.error('Subscription check error:', e);
                    return false;
                }
            }

            // ===== HELPERS =====
            function showMessage(text, type = 'info') {
                messageEl.textContent = text;
                messageEl.className = 'message ' + type;
                if (type !== 'success' && type !== 'error') {
                    clearTimeout(messageEl._timeout);
                    messageEl._timeout = setTimeout(() => {
                        if (messageEl.textContent === text) {
                            messageEl.textContent = '';
                            messageEl.className = 'message';
                        }
                    }, 5000);
                }
            }

            function setKeyDisplay(active, text, isPlaceholder = false) {
                if (active) {
                    keyBox.classList.add('active');
                } else {
                    keyBox.classList.remove('active');
                }
                keyText.textContent = text;
                keyText.className = 'key-text' + (isPlaceholder ? ' placeholder' : ' generated');
            }

            function setButtonsEnabled(enabled) {
                copyBtn.disabled = !enabled || !syncComplete || !currentKey || !isSubscribed;
            }

            // ===== FETCH INTERNET TIME =====
            async function fetchInternetTime() {
                const sources = [
                    async () => {
                        const response = await fetch('https://worldtimeapi.org/api/timezone/Europe/Moscow', {
                            cache: 'no-store',
                            signal: AbortSignal.timeout(3000)
                        });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const data = await response.json();
                        if (data && data.unixtime) return data.unixtime + MSK_OFFSET;
                        throw new Error('No unixtime');
                    },
                    async () => {
                        const response = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Europe/Moscow', {
                            cache: 'no-store',
                            signal: AbortSignal.timeout(3000)
                        });
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        const data = await response.json();
                        if (data && data.dateTime) {
                            const utc = Math.floor(new Date(data.dateTime).getTime() / 1000);
                            return utc + MSK_OFFSET;
                        }
                        throw new Error('No dateTime');
                    }
                ];

                for (let i = 0; i < sources.length; i++) {
                    try {
                        const result = await sources[i]();
                        if (result && result > 0) return result;
                    } catch (e) {
                        continue;
                    }
                }
                return null;
            }

            // ===== SYNC TIME =====
            async function syncTime() {
                setKeyDisplay(false, '⏳ Loading...', true);
                setButtonsEnabled(false);

                const mskTimestamp = await fetchInternetTime();

                if (mskTimestamp !== null && mskTimestamp > 0) {
                    internetTimestamp = mskTimestamp;
                    syncComplete = true;
                    return true;
                }

                syncComplete = false;
                internetTimestamp = null;
                setKeyDisplay(false, '❌ Connection failed', true);
                showMessage('❌ Failed to sync time', 'error');
                return false;
            }

            // ===== GET MSK DATE =====
            function getMskDate() {
                if (!internetTimestamp) return null;
                const date = new Date(internetTimestamp * 1000);
                let wday = date.getUTCDay();
                if (wday === 0) wday = 7;
                return {
                    year: date.getUTCFullYear(),
                    month: date.getUTCMonth() + 1,
                    day: date.getUTCDate(),
                    wday: wday
                };
            }

            // ===== GENERATE KEY =====
            function generateKey() {
                if (!syncComplete || !internetTimestamp) {
                    showMessage('⏳ Please wait for sync...', 'warning');
                    return null;
                }

                if (!isSubscribed) {
                    setKeyDisplay(false, '❌ Access Denied', true);
                    showMessage('❌ You must be subscribed to the channel!', 'error');
                    setButtonsEnabled(false);
                    return null;
                }

                const mskDate = getMskDate();
                if (!mskDate) {
                    showMessage('❌ No internet time available', 'error');
                    return null;
                }

                const wday = mskDate.wday;
                const allowedChars = DailyCharSets[wday] || [];
                
                if (allowedChars.length === 0) {
                    showMessage(`❌ No chars for day ${wday}`, 'error');
                    return null;
                }

                const pool = [...allowedChars];
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }

                let keyChars = pool.slice(0, 10);
                while (keyChars.length < 10) {
                    keyChars.push(allowedChars[Math.floor(Math.random() * allowedChars.length)]);
                }

                for (let i = keyChars.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [keyChars[i], keyChars[j]] = [keyChars[j], keyChars[i]];
                }

                const key = keyChars.join('').toUpperCase();
                currentKey = key;
                setKeyDisplay(true, key);
                setButtonsEnabled(true);
                showMessage('✅ Key ready!', 'success');
                setTimeout(() => { 
                    if (messageEl.textContent === '✅ Key ready!') {
                        messageEl.textContent = '';
                        messageEl.className = 'message';
                    }
                }, 2000);
                
                if (tg) tg.HapticFeedback?.impactOccurred('light');
                return key;
            }

            // ===== COPY =====
            function copyToClipboard(text) {
                if (!text || !isSubscribed) return;
                if (navigator.clipboard?.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            showMessage('📋 Copied!', 'success');
                            if (tg) tg.HapticFeedback?.notificationOccurred('success');
                        })
                        .catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.left = '-9999px';
                ta.style.top = '-9999px';
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand('copy');
                    showMessage('📋 Copied!', 'success');
                } catch (_) {
                    showMessage('❌ Failed to copy', 'error');
                }
                document.body.removeChild(ta);
            }

            // ===== PROCESS VALID SUBSCRIPTION =====
            async function handleValidSubscription() {
                subBtn.style.display = 'none';
                checkSubBtn.style.display = 'none';
                await syncTime();

                if (syncComplete && internetTimestamp) {
                    const date = new Date(internetTimestamp * 1000);
                    lastDayChecked = `${date.getUTCDate()}.${date.getUTCMonth() + 1}.${date.getUTCFullYear()}`;
                    generateKey();
                }
            }

            // ===== EVENT LISTENERS =====
            copyBtn.addEventListener('click', () => {
                if (currentKey) copyToClipboard(currentKey);
            });

            keyBox.addEventListener('click', () => {
                if (currentKey && syncComplete) {
                    copyToClipboard(currentKey);
                }
            });

            brandLink.addEventListener('click', () => {
                if (tg) {
                    tg.openTelegramLink(CHANNEL_URL);
                } else {
                    window.open(CHANNEL_URL, '_blank');
                }
            });

            subBtn.addEventListener('click', () => {
                if (tg) {
                    tg.openTelegramLink(CHANNEL_URL);
                } else {
                    window.open(CHANNEL_URL, '_blank');
                }
            });

            // "Check Subscription" manual action
            checkSubBtn.addEventListener('click', async () => {
                const userId = tg?.initDataUnsafe?.user?.id;
                if (!userId) return;

                checkSubBtn.disabled = true;
                showMessage('🔄 Checking subscription...', 'info');

                isSubscribed = await checkTelegramSubscription(userId);

                checkSubBtn.disabled = false;
                if (isSubscribed) {
                    await handleValidSubscription();
                } else {
                    showMessage('❌ Subscription not found. Please join the channel first.', 'error');
                }
            });

            // ===== CHECK DAY CHANGE =====
            let lastDayChecked = '';

            function checkDayChange() {
                if (!syncComplete || !internetTimestamp) return;
                const date = new Date(internetTimestamp * 1000);
                const currentDateStr = `${date.getUTCDate()}.${date.getUTCMonth() + 1}.${date.getUTCFullYear()}`;
                if (currentDateStr !== lastDayChecked) {
                    lastDayChecked = currentDateStr;
                    if (syncComplete && isSubscribed) {
                        generateKey();
                    }
                }
            }

            // ===== INIT =====
            async function init() {
                setButtonsEnabled(false);
                subBtn.style.display = 'none';
                checkSubBtn.style.display = 'none';
                setKeyDisplay(false, '⏳ Verifying...', true);

                const userId = tg?.initDataUnsafe?.user?.id;

                if (!userId) {
                    setKeyDisplay(false, '❌ Use Telegram', true);
                    showMessage('❌ Please open this app inside Telegram.', 'error');
                    return;
                }

                isSubscribed = await checkTelegramSubscription(userId);

                if (!isSubscribed) {
                    setKeyDisplay(false, '🔒 Access Denied', true);
                    showMessage('❌ Please subscribe to our channel to get the key.', 'error');
                    subBtn.style.display = 'block';
                    checkSubBtn.style.display = 'block'; // Show check button
                    return;
                }

                await handleValidSubscription();
                setInterval(checkDayChange, 10000);

                // Auto re-check when user returns to the app
                document.addEventListener('visibilitychange', async () => {
                    if (!document.hidden) {
                        const subCheckBefore = isSubscribed;
                        isSubscribed = await checkTelegramSubscription(userId);
                        
                        if (!isSubscribed) {
                            setKeyDisplay(false, '🔒 Access Denied', true);
                            subBtn.style.display = 'block';
                            checkSubBtn.style.display = 'block';
                            setButtonsEnabled(false);
                        } else {
                            if (!subCheckBefore || !syncComplete) {
                                await handleValidSubscription();
                            }
                        }
                    }
                });
            }

            init();
            if (tg) tg.ready();
        })();
    </script>
</body>
</html>
